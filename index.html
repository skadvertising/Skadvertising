.hero{
    background:#111;

.services{

.service-box{

}

/* Gallery */
.gallery{
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}
.grid img{
    width:100%;
    border-radius:10px;
}

/* Contact */
.contact{

/* WhatsApp */

    background:#25D366;
