<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Advertising</title>

<style>
*{
    box-sizing:border-box;
}
body{
    margin:0;
    font-family:Arial;
    overflow-x:hidden;
}

/* Navbar */
nav{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
}
nav ul{
    display:flex;
    gap:10px;
    list-style:none;
}

/* Hero */
.hero{
    background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
    padding:80px 20px;
}

/* Services */
.services{
    padding:20px;
    text-align:center;
}
.service-box{
    width:100%;
    margin:10px 0;
    padding:15px;
    background:#eee;
}

/* Gallery */
.gallery img{
    width:100%;
    margin:10px 0;
}

/* WhatsApp Button */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<nav>
<h2>SK Advertising</h2>
<ul>
<li>Home</li>
<li>Services</li>
<li>Gallery</li>
</ul>
</nav>

<section class="hero">
<h2>Creative Poster & Wedding Card Design</h2>
<p>Professional Design Services</p>
</section>

<section class="services">
<h2>Our Services</h2>
<div class="service-box">Poster Design</div>
<div class="service-box">Wedding Card Design</div>
<div class="service-box">Flex & Banner</div>
</section>

<a href="https://wa.me/919876543210" class="whatsapp">📲</a>

</body>
</html>
